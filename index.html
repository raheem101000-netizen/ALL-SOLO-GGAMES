<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediaSkills — Games</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #05050f; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 40px 24px; }
h1 { color: #fff; font-size: 28px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; }
p { color: rgba(255,255,255,0.35); font-size: 13px; letter-spacing: 1px; margin-bottom: 48px; }
.games { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 360px; }
a.card { display: block; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09); border-radius: 14px; padding: 24px 22px; text-decoration: none; transition: transform 0.15s, border-color 0.15s; }
a.card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.2); }
.badge { display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; margin-bottom: 10px; }
.kurver .badge { background: rgba(80,200,255,0.12); color: #50c8ff; border: 1px solid rgba(80,200,255,0.2); }
.pong .badge   { background: rgba(76,255,108,0.12); color: #4CFF6C; border: 1px solid rgba(76,255,108,0.2); }
.card-title { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.card-desc  { font-size: 12px; color: rgba(255,255,255,0.4); line-height: 1.6; }
</style>
</head>
<body>
<h1>MediaSkills</h1>
<p>Solo Games — Gameplay Testing</p>
<div class="games">
  <a href="/kurver/" class="card kurver">
    <div class="badge">Curve fever</div>
    <div class="card-title">Kurver</div>
    <div class="card-desc">20 matches against AI survivors and hunters. Steer with arrow keys or tap left/right.</div>
  </a>
  <a href="/pong/" class="card pong">
    <div class="badge">Pong</div>
    <div class="card-title">Pong</div>
    <div class="card-desc">10-match series vs AI. Drag or use arrow keys. Power-ups, obstacles, escalating difficulty.</div>
  </a>
</div>
</body>
</html>
